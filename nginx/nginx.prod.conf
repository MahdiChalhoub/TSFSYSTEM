# ═══════════════════════════════════════════════════════════════════════════════
# TSFSYSTEM — Nginx Production Configuration
# Cloudflare handles SSL termination → Nginx listens on port 80
# ═══════════════════════════════════════════════════════════════════════════════

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # WebSocket upgrade map (for Next.js HMR if needed)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstream Definitions ──────────────────────────────────────────────────
    upstream django {
        server backend:8000;
    }

    upstream nextjs {
        server frontend:3000;
    }

    # ── Main Server ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name *.tsf.ci tsf.ci _;

        # ── 1. API → Django (Gunicorn) ────────────────────────────────────────
        location /api/ {
            proxy_pass http://django/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
            proxy_send_timeout 300s;
        }

        # ── 2. Django Admin ───────────────────────────────────────────────────
        location /admin/ {
            proxy_pass http://django/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── 3. Django Static Files ────────────────────────────────────────────
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ── 4. Media Files ────────────────────────────────────────────────────
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── 5. Let's Encrypt ACME Challenge ───────────────────────────────────
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ── 6. Everything Else → Next.js (containerized) ─────────────────────
        location / {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # No caching for dynamic pages
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
            add_header CDN-Cache-Control "no-store" always;
            add_header Cloudflare-CDN-Cache-Control "no-store" always;
        }

        # ── Next.js Static Assets (cached) ───────────────────────────────────
        location /_next/static/ {
            proxy_pass http://nextjs;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }
    }
}
