events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    client_max_body_size 500M;

    # ─── Hide Server Version ──────────────────────────────────────────────
    server_tokens off;

    # ─── Gzip Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ─── Optimize for WebSocket (Next.js HMR) ─────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─── SSL Dynamic Certificate Selection ────────────────────────────────
    # For custom domains, try to load their specific cert.
    # Falls back to the default saas.tsf.ci cert.
    # Certbot stores certs at: /etc/letsencrypt/live/<domain>/
    
    # Rate limiting zone for domain resolution
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=domain_resolve:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=3r/m;

    # ─── Default Server (*.tsf.ci + custom domains) ───────────────────────
    # This server block handles ALL traffic:
    #   - *.tsf.ci subdomains (via Cloudflare → port 443)
    #   - Custom domains (via CNAME/A record → port 80/443)
    #
    # Nginx doesn't inspect the hostname here — Next.js middleware does the routing.
    # Nginx's job: SSL termination + proxy to backend/frontend.
    server {
        listen 80;
        listen 443 ssl;
        server_name _;

        # Default SSL cert (for *.tsf.ci via Cloudflare)
        ssl_certificate /etc/letsencrypt/live/saas.tsf.ci/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/saas.tsf.ci/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ─── Security Headers ─────────────────────────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # CSP is set by Next.js in next.config.ts — NOT duplicated here.
        # Having both causes Nginx to override the more specific Next.js policy.

        # ─── ACME Challenge (Let's Encrypt / Certbot) ─────────────────────
        # Must be accessible on port 80 for domain verification.
        # Certbot writes challenge files here during cert provisioning.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # ─── API Proxy (Next.js → handles org settings / backend proxy) ────
        location ~ ^/api/(proxy|org-currency)/? {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            client_max_body_size 500M;
        }

        # ─── API Direct (Backend Django) ──────────────────────────────────
        # ─── Login Rate Limiting ──────────────────────────────────────────
        location /api/auth/login/ {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://backend:8000/api/auth/login/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── API Direct (Backend Django) ──────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # ─── Domain Resolution (Rate-Limited) ────────────────────────────
        # Public endpoint for middleware to resolve custom domains.
        # Rate-limited at Nginx level + application level.
        location = /api/domains/resolve/ {
            limit_req zone=domain_resolve burst=10 nodelay;
            proxy_pass http://backend:8000/api/domains/resolve/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Cache the response at Nginx level too (belt + suspenders)
            proxy_cache_valid 200 60s;
            proxy_cache_valid 404 30s;
        }

        # ─── Django Admin Panel ───────────────────────────────────────────
        location /admin/ {
            proxy_pass http://backend:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Django Static Files (Admin CSS/JS) ──────────────────────────
        location /static/ {
            proxy_pass http://backend:8000/static/;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=2592000";
        }

        # ─── User Uploaded Media Files ──────────────────────────────────
        location /media/ {
            alias /var/www/media/;
            add_header Cache-Control "public, max-age=86400";
            autoindex off;
        }

        # ─── Next.js Static Assets (Immutable Cache) ─────────────────────
        location /_next/static/ {
            proxy_pass http://frontend:3000/_next/static/;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ─── Everything Else → Next.js Frontend ──────────────────────────
        # Next.js middleware handles:
        #   - *.tsf.ci subdomain → tenant routing
        #   - Custom domains → resolve via API → route
        #   - SaaS panel → pass through
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
