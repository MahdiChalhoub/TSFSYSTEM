events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Optimize for WebSocket (Next.js HMR)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Main server - HTTP only (Cloudflare handles SSL termination)
    server {
        listen 80;
        server_name _;

        # 1a. Next-only API routes — these live in src/app/api/* and must
        # NOT be sent to Django. `=` (exact match) wins over the generic
        # /api/ prefix block below by nginx-precedence rules.
        location = /api/perf-log {
            proxy_pass http://host.docker.internal:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location = /api/org-currency {
            proxy_pass http://host.docker.internal:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/erp/ {
            proxy_pass http://host.docker.internal:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 1b. Proxy all other /api requests to Backend (Django)
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # 2. Django Admin Panel
        location /admin/ {
            proxy_pass http://backend:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Django Static Files (Admin CSS/JS)
        location /static/ {
            proxy_pass http://backend:8000/static/;
            proxy_set_header Host $host;
        }

        # 4. Let's Encrypt ACME Challenge (if needed later)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 5. Everything else -> Next.js Frontend (PM2 on host, not Docker)
        location / {
            proxy_pass http://host.docker.internal:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;  # Cloudflare handles SSL termination
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Prevent Cloudflare from caching dynamic pages
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
            add_header CDN-Cache-Control "no-store" always;
            add_header Cloudflare-CDN-Cache-Control "no-store" always;
        }
    }
}
