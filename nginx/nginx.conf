events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    client_max_body_size 500M;
    
    # Optimize for WebSocket (Next.js HMR)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Main server - HTTP only (Cloudflare handles SSL termination)
    server {
        listen 80;
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/letsencrypt/live/saas.tsf.ci/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/saas.tsf.ci/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # 1. Proxy /api requests to Backend
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # 2. Django Admin Panel
        location /admin/ {
            proxy_pass http://backend:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Django Static Files (Admin CSS/JS)
        location /static/ {
            proxy_pass http://backend:8000/static/;
            proxy_set_header Host $host;
        }

        # 4. Let's Encrypt ACME Challenge (if needed later)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 5. Everything else -> Next.js Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
