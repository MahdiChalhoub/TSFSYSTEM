events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Optimize for WebSocket (Next.js HMR)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP -> HTTPS redirect (production)
    server {
        listen 80;
        server_name saas.tsf.ci *.tsf.ci;

        # Let's Encrypt ACME Challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server (production - uncomment after getting SSL cert)
    # server {
    #     listen 443 ssl http2;
    #     server_name saas.tsf.ci *.tsf.ci;

    #     ssl_certificate /etc/letsencrypt/live/tsf.ci/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/tsf.ci/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;

    #     # 1. Proxy /api requests to Backend
    #     location /api/ {
    #         proxy_pass http://backend:8000/api/;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #         proxy_read_timeout 300s;
    #         proxy_connect_timeout 75s;
    #     }

    #     # 2. Django Admin Panel
    #     location /admin/ {
    #         proxy_pass http://backend:8000/admin/;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     }

    #     # 3. Django Static Files
    #     location /static/ {
    #         proxy_pass http://backend:8000/static/;
    #         proxy_set_header Host $host;
    #     }

    #     # 4. Everything else -> Next.js Frontend
    #     location / {
    #         proxy_pass http://frontend:3000;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection $connection_upgrade;
    #     }
    # }

    # Fallback HTTP server for initial setup / local dev / direct IP access
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;

        # Self-signed fallback (will show browser warning)
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;

        # 1. Proxy /api requests to Backend
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # 2. Django Admin Panel
        location /admin/ {
            proxy_pass http://backend:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Django Static Files (Admin CSS/JS)
        location /static/ {
            proxy_pass http://backend:8000/static/;
            proxy_set_header Host $host;
        }

        # 4. Let's Encrypt ACME Challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 5. Everything else -> Next.js Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
