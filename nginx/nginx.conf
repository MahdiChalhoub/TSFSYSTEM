events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Optimize for WebSocket (Next.js HMR)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # 1. Proxy /api requests to Backend via Internal Network
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Increase timeout for long-running reports
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # 2. Proxy Django Admin /admin/django/ to Backend
        # We rewrite /admin/django -> /admin because Django expects /admin
        # But wait, TSF uses /admin for Next.js.
        # Let's assume Django Admin is NOT primary.
        # If we need Django Admin access, we can route /django-admin/
        location /django-static/ {
             proxy_pass http://backend:8000/django-static/;
        }

        # 3. Everything else -> Next.js Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
