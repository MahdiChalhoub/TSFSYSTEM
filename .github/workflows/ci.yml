name: TSF Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # BACKEND: Lint + Type Check + Test
  # ═══════════════════════════════════════════════════════════════════════════
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install linter
        run: pip install ruff
      - name: Run ruff
        run: ruff check erp_backend/erp/ erp_backend/apps/ --output-format github

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_tsf
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd erp_backend
          pip install -r requirements.txt

      - name: Run tests (198 tests across all modules)
        env:
          DB_NAME: test_tsf
          DB_USER: postgres
          DB_PASSWORD: testpass123
          DB_HOST: localhost
          DB_PORT: 5432
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DJANGO_DEBUG: 'False'
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          LOCAL_DEV: '1'
        run: |
          cd erp_backend
          python manage.py test \
            apps.pos.tests.test_pos_integrity \
            apps.finance.tests.test_ledger_service \
            apps.finance.tests.test_finance_rules \
            apps.inventory.tests.test_inventory_service \
            apps.crm.tests.test_loyalty_service \
            apps.hr.tests.test_hr_models \
            erp.tests.test_encryption \
            erp.tests.test_permissions \
            erp.tests.test_tenant_isolation \
            erp.tests.test_connector_engine \
            erp.tests.test_mixed_tax_engine \
            erp.tests.test_api_endpoints \
            erp.tests.test_error_handler \
            --verbosity=2 --no-input

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: erp_backend/coverage.xml

  # ═══════════════════════════════════════════════════════════════════════════
  # FRONTEND: Lint + Type Check + Build
  # ═══════════════════════════════════════════════════════════════════════════
  frontend-check:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/ --max-warnings=50

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
          NEXT_PUBLIC_ROOT_DOMAIN: localhost
        run: npm run build

  # ═══════════════════════════════════════════════════════════════════════════
  # DOCKER: Build images (on main only)
  # ═══════════════════════════════════════════════════════════════════════════
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t tsf-backend:${{ github.sha }} -f erp_backend/Dockerfile erp_backend/

      - name: Build frontend image
        run: docker build -t tsf-frontend:${{ github.sha }} .

  # ═══════════════════════════════════════════════════════════════════════════
  # DEPLOY: Production deployment (manual approval recommended)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production  # Requires manual approval in GitHub settings
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "🚀 Deployment would happen here"
          echo "Target: $DEPLOY_HOST"
          echo "Commit: ${{ github.sha }}"
          # Uncomment when ready:
          # mkdir -p ~/.ssh
          # echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          # chmod 600 ~/.ssh/deploy_key
          # ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST \
          #   "cd /app && git pull && docker compose up -d --build"
