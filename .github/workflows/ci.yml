name: TSFSYSTEM CI

on:
  push:
    branches: [ "main", "develop", "staging" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  frontend-ci:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  backend-ci:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest
    
    # Needs PostgreSQL and Redis services for testing
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tsfuser
          POSTGRES_PASSWORD: tsfpassword
          POSTGRES_DB: tsfci_test_db
        ports:
          - 5432:5432
        options: >-
          -- स्वास्थ्य जांच 
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
          
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        working-directory: ./erp_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 isort pytest pytest-django coverage
          
      - name: 🔒 Architecture Enforcement
        run: |
          pip install pyyaml
          python3 .ai/enforcement/enforce.py check
        continue-on-error: false

      - name: Check imports with isort
        working-directory: ./erp_backend
        run: isort --check-only .

      - name: Lint with flake8
        working-directory: ./erp_backend
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
          
      - name: Run Django Tests
        working-directory: ./erp_backend
        env:
          DATABASE_URL: postgres://tsfuser:tsfpassword@localhost:5432/tsfci_test_db
          SECRET_KEY: testing-secret-key-123
          REDIS_URL: redis://localhost:6379/1
          DEBUG: False
        run: |
          coverage run manage.py test
          coverage report -m
