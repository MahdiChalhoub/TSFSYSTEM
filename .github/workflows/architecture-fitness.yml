name: Architecture Fitness
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  fitness:
    name: Architecture Fitness Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run architecture fitness tests
        run: bash scripts/ci/check-architecture-fitness.sh
