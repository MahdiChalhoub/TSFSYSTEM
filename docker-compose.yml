version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tsf_db
    environment:
      POSTGRES_DB: ${DB_NAME:-tsfdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tsf_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: tsf_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - tsf_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: ./erp_backend
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    volumes:
      - ./erp_backend:/app
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-tsfdb}
      - DB_NAME=${DB_NAME:-tsfdb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,tsf_backend}
      - TOKEN_TTL_HOURS=24
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tsf_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  celery_worker:
    build:
      context: ./erp_backend
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: celery -A core worker -l info --concurrency=2
    volumes:
      - ./erp_backend:/app
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-tsfdb}
      - DB_NAME=${DB_NAME:-tsfdb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tsf_network
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  celery_beat:
    build:
      context: ./erp_backend
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: celery -A core beat -l info
    volumes:
      - ./erp_backend:/app
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-tsfdb}
      - DB_NAME=${DB_NAME:-tsfdb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tsf_network
    deploy:
      resources:
        limits:
          memory: 256M

  mcp_agent_pulse:
    build:
      context: ./erp_backend
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: python /scripts/agent_pulse.py
    volumes:
      - ./erp_backend:/app
      - ./scripts:/scripts
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-tsfdb}
      - DB_NAME=${DB_NAME:-tsfdb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tsf_network
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - DJANGO_URL=http://backend:8000
      - NEXT_PUBLIC_ROOT_DOMAIN=tsf.ci
    depends_on:
      - backend
    networks:
      - tsf_network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: tsf_gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./erp_backend/media:/var/www/media:ro
    depends_on:
      - frontend
      - backend
    networks:
      - tsf_network

  certbot:
    image: certbot/certbot
    container_name: tsf_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  tsf_network:
    driver: bridge

volumes:
  postgres_data:
