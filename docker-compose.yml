version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tsf_db
    environment:
      POSTGRES_DB: ${DB_NAME:-tsfdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tsf_network

  backend:
    build:
      context: ./erp_backend
      dockerfile: Dockerfile.backend
    container_name: tsf_backend
    volumes:
      - ./erp_backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-tsfdb}
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=1
    depends_on:
      - db
    networks:
      - tsf_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tsf_frontend
    # Ports removed (internal only)
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - DJANGO_URL=http://backend:8000
      - NEXT_PUBLIC_ROOT_DOMAIN=tsf.ci
    depends_on:
      - backend
    networks:
      - tsf_network

  nginx:
    image: nginx:alpine
    container_name: tsf_gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - tsf_network

  # Optional: Auto-renew SSL certificates
  certbot:
    image: certbot/certbot
    container_name: tsf_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  tsf_network:
    driver: bridge

volumes:
  postgres_data:
