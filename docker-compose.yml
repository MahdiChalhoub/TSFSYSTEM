# ═══════════════════════════════════════════════════════════════════════════════
# TSFSYSTEM — Docker Compose (Production)
# ═══════════════════════════════════════════════════════════════════════════════
#
# All services are fully containerised — nothing depends on the host machine.
# Data is stored in named Docker volumes so it survives restarts and upgrades.
#
# First-time setup on a new server:
#   1. Copy .env.production → .env and fill in secrets
#   2. docker compose up -d --build
#   3. docker compose exec backend python manage.py migrate
#
# One-time DB migration from host Postgres (only needed the first time):
#   pg_dump -U postgres tsfdb | docker compose exec -T postgres psql -U postgres tsfdb
#
# Upgrading (zero downtime pattern):
#   docker compose pull          # or: docker compose build --no-cache
#   docker compose up -d         # rolling restart — old containers stay up until new ones are ready
#
# Scaling:
#   To move a service to another server, just point the relevant env var at it:
#     - Frontend → DJANGO_URL=http://<backend-server>:8000
#     - Backend  → DB_HOST=<db-server>, CELERY_BROKER_URL=redis://<redis-server>:6379/0
#
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tsf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-tsfdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # NOT exposed to host — only reachable inside tsf_network.
    # To connect from outside: docker compose exec postgres psql -U postgres tsfdb
    networks:
      - tsf_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-tsfdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${PG_MEMORY_LIMIT:-2G}
        reservations:
          memory: ${PG_MEMORY_RESERVE:-512M}

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tsf_redis
    restart: unless-stopped
    command: redis-server --maxmemory ${REDIS_MAXMEMORY:-512mb} --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redisdata:/data
    # NOT exposed to host — only reachable inside tsf_network.
    networks:
      - tsf_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-512M}
        reservations:
          memory: ${REDIS_MEMORY_RESERVE:-128M}

  # ─── PgBouncer (Connection Pooler) ──────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    container_name: tsf_pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-tsfdb}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=500
      - DEFAULT_POOL_SIZE=50
      - MIN_POOL_SIZE=10
      - RESERVE_POOL_SIZE=10
      - SERVER_RESET_QUERY=DISCARD ALL
      - AUTH_TYPE=scram-sha-256
    networks:
      - tsf_network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  # ─── Django Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./erp_backend
      dockerfile: Dockerfile.backend
    container_name: tsf_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./erp_backend:/app
      - mediafiles:/app/media
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-tsfdb}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-tsfdb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DEBUG=0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - TOKEN_TTL_HOURS=${TOKEN_TTL_HOURS:-24}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # Feature flag — OB → JE unification (Phase 3 rollout).
      # When true, balance services read opening balances from OPENING
      # JE rows instead of the legacy OpeningBalance table. Flip only
      # after `manage.py backfill_opening_jes --org <slug> --flag-check`
      # passes cleanly (see ClosingService.is_safe_to_flip_flag).
      - USE_JE_OPENING=${USE_JE_OPENING:-false}
    networks:
      - tsf_network
    deploy:
      resources:
        limits:
          memory: ${BACKEND_MEMORY_LIMIT:-2G}
        reservations:
          memory: ${BACKEND_MEMORY_RESERVE:-512M}

  # ─── Celery Worker ────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./erp_backend
      dockerfile: Dockerfile.backend
    container_name: tsf_celery
    restart: unless-stopped
    command: celery -A core worker -l info --concurrency=${CELERY_CONCURRENCY:-4} -Q default,critical,bulk
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./erp_backend:/app
      - mediafiles:/app/media
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-tsfdb}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-tsfdb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - tsf_network
    deploy:
      resources:
        limits:
          memory: ${CELERY_MEMORY_LIMIT:-1G}
        reservations:
          memory: ${CELERY_MEMORY_RESERVE:-256M}

  # ─── Celery Beat (Scheduler) ─────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./erp_backend
      dockerfile: Dockerfile.backend
    container_name: tsf_celery_beat
    restart: unless-stopped
    command: celery -A core beat -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./erp_backend:/app
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-tsfdb}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-tsfdb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - tsf_network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ─── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tsf_frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./next.config.ts:/app/next.config.ts
      - ./tsconfig.json:/app/tsconfig.json
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - DJANGO_URL=http://backend:8000
      - NEXT_PUBLIC_ROOT_DOMAIN=${NEXT_PUBLIC_ROOT_DOMAIN:-tsf.ci}
      - ROOT_DOMAIN=${ROOT_DOMAIN:-tsf.ci}
    networks:
      - tsf_network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

# ─── Named Volumes (data survives container restarts and upgrades) ─────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  mediafiles:
    driver: local

# ─── Network ──────────────────────────────────────────────────────────────────
networks:
  tsf_network:
    driver: bridge
