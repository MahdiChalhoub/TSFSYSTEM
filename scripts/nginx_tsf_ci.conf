# Single server block — Cloudflare handles SSL termination
# SSL mode in Cloudflare should be "Full (Strict)" or "Full"
server {
    listen 80;
    listen 443 ssl;
    server_name tsf.ci *.tsf.ci;

    ssl_certificate /etc/letsencrypt/live/tsf.ci/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tsf.ci/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # Frontend - Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API - Django/Gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin (Secret Path)
    location /tsf-system-kernel-7788/ {
        # allow 172.68.13.143; # User current IP (Cloudflare)
        # allow 172.68.13.0/24; # Range
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files
    location /static/ {
        alias /var/www/tsf_static/;
    }

    # Media files
    location /media/ {
        alias /var/www/tsf_media/;
    }
}
