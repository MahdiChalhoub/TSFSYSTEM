<!DOCTYPE html>
<html>
<head><title>Test API</title></head>
<body>
<h1>Testing Theme API</h1>
<button onclick="testAPI()">Test /api/themes/</button>
<pre id="output"></pre>
<script>
async function testAPI() {
  const output = document.getElementById('output');
  try {
    const response = await fetch('/api/themes/', { credentials: 'include' });
    output.textContent = `Status: ${response.status}\n\n`;
    const data = await response.json();
    output.textContent += JSON.stringify(data, null, 2);
  } catch (e) {
    output.textContent = `Error: ${e.message}`;
  }
}
</script>
</body>
</html>
