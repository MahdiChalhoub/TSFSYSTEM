# ═══════════════════════════════════════════════════════════════════════════════
# TSFSYSTEM — Docker Compose for Production (tsf.ci)
# ═══════════════════════════════════════════════════════════════════════════════
#
# All 6 services fully containerised. Cloudflare handles SSL termination.
#
# Deploy:
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Update (zero-downtime):
#   docker compose -f docker-compose.prod.yml build backend frontend
#   docker compose -f docker-compose.prod.yml up -d --no-deps backend frontend
#
# Stop:
#   docker compose -f docker-compose.prod.yml down
#
# Full reset (including database):
#   docker compose -f docker-compose.prod.yml down -v
#
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tsf_prod_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-tsfdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - prod_pgdata:/var/lib/postgresql/data
    networks:
      - tsf_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-tsfdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tsf_prod_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - prod_redisdata:/data
    networks:
      - tsf_prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ─── Django Backend (Gunicorn) ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.prod
    container_name: tsf_prod_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - prod_mediafiles:/app/media
      - prod_staticfiles:/app/staticfiles
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-tsfdb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-tsfdb}
      - DEBUG=0
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-27jAsA3h2yvYS38acGc0hmWZnSSkeMxAf-XEETknnuIe0SO13YSJwcdfwhc3ZfEry2I}
      - DJANGO_ALLOWED_HOSTS=.tsf.ci,localhost,127.0.0.1,backend,.developos.shop
      - TOKEN_TTL_HOURS=${TOKEN_TTL_HOURS:-24}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - tsf_prod
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ─── Celery Worker ──────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend.prod
    container_name: tsf_prod_celery
    restart: unless-stopped
    command: celery -A core worker -l info --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - prod_mediafiles:/app/media
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-tsfdb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-tsfdb}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-27jAsA3h2yvYS38acGc0hmWZnSSkeMxAf-XEETknnuIe0SO13YSJwcdfwhc3ZfEry2I}
      - DJANGO_ALLOWED_HOSTS=.tsf.ci,localhost
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - tsf_prod
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ─── Celery Beat (Scheduler) ────────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.backend.prod
    container_name: tsf_prod_celery_beat
    restart: unless-stopped
    command: celery -A core beat -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-tsfdb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-tsfdb}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-27jAsA3h2yvYS38acGc0hmWZnSSkeMxAf-XEETknnuIe0SO13YSJwcdfwhc3ZfEry2I}
      - DJANGO_ALLOWED_HOSTS=.tsf.ci,localhost
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - tsf_prod
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ─── Next.js Frontend (Production Build) ────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
      args:
        - NEXT_PUBLIC_ROOT_DOMAIN=tsf.ci
        - NEXT_PUBLIC_API_URL=/api
    container_name: tsf_prod_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - DJANGO_URL=http://backend:8000
      - NEXT_PUBLIC_ROOT_DOMAIN=tsf.ci
      - ROOT_DOMAIN=tsf.ci
      - NODE_ENV=production
    networks:
      - tsf_prod
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ─── Nginx Gateway ─────────────────────────────────────────────────────────
  gateway:
    image: nginx:alpine
    container_name: tsf_prod_gateway
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - prod_staticfiles:/app/staticfiles:ro
      - prod_mediafiles:/app/media:ro
    networks:
      - tsf_prod
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

# ─── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  prod_pgdata:
    driver: local
  prod_redisdata:
    driver: local
  prod_mediafiles:
    driver: local
  prod_staticfiles:
    driver: local

# ─── Network ──────────────────────────────────────────────────────────────────
networks:
  tsf_prod:
    driver: bridge
