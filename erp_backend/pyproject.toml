[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "core.settings"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
testpaths = [
    "erp/tests",
    "apps/finance/tests",
    "apps/inventory/tests",
    "apps/pos/tests",
]
addopts = "-v --tb=short"

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]  # We use 120-char lines, let Ruff handle it

[tool.coverage.run]
source = ["erp", "apps"]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/__init__.py",
    "*/admin.py",
    "manage.py",
    "core/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 50  # Start at 50%, increase as coverage grows
